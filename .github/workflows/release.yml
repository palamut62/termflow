name: Windows Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package:verify
      - name: Verify tag matches manifest
        shell: pwsh
        run: |
          $version = (Get-Content release-manifest.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag and release manifest do not match" }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TermFlow ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/TermFlow-*-x64.exe
            dist/TermFlow-*-x64.exe.blockmap
            dist/TermFlow-*-x64.zip
            dist/latest.yml
