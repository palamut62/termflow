<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262b34"/>
      <stop offset="1" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f80ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2f80ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#glow)"/>
  <rect x="26.5" y="26.5" width="459" height="459" rx="101.5" fill="none" stroke="#2f3440" stroke-width="5"/>

  <!-- Yellow active-border accent (echoes the reference active terminal) -->
  <path d="M104 60 h-20 a24 24 0 0 0 -24 24 v20" fill="none" stroke="#f5e642" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <path d="M408 452 h20 a24 24 0 0 0 24 -24 v-20" fill="none" stroke="#f5e642" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- Terminal glyph (lucide:terminal), scaled ×10 centered -->
  <g transform="translate(136,136) scale(10)">
    <!-- chevron: accent blue -->
    <path d="M4 17l6-6l-6-6" fill="none" stroke="#2f80ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- prompt underscore: yellow cursor -->
    <path d="M12 19h8" fill="none" stroke="#f5e642" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
